
{% extends "base.html" %}

{% block title %}
Edit Post
{% endblock %}

{% block content %}

<h1>Edit Post</h1>

<form method="POST">

    <textarea
        name="content"
        rows="4"
        cols="40"
    >{{ post.content }}</textarea>

    <br><br>

    <button type="submit">
        Save Changes
    </button>

</form>

{% endblock %}
