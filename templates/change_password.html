
{% extends "base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<h1>Change Password</h1>

<form method="POST">

    <input type="password"
           name="current_password"
           placeholder="Current Password">

    <br><br>

    <input type="password"
           name="new_password"
           placeholder="New Password">

    <br><br>

    <input type="password"
           name="confirm_password"
           placeholder="Confirm New Password">

    <br><br>

    <button type="submit">
        Update Password
    </button>

</form>

{% endblock %}
