
{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<h1>Edit Profile</h1>

<form method="POST">

    <textarea
        name="bio"
        rows="5"
        cols="40"
    >{{ user.bio }}</textarea>

    <br><br>

    <button type="submit">
        Save Profile
    </button>

</form>

{% endblock %}
