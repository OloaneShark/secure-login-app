
{% extends "base.html" %}

{% block title %}
Admin
{% endblock %}

{% block content %}

<h1>Admin Dashboard</h1>

<h2>Users</h2>

{% for user in users %}
    <p>
        {{ user.username }} |
        {{ user.email }} |
        Admin: {{ user.is_admin }} |
        Provider: {{ user.auth_provider }}
    </p>
{% endfor %}

{% endblock %}
