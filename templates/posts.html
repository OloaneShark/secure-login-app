
{% extends "base.html" %}

{% block title %}
Posts
{% endblock %}

{% block content %}

<h1>Posts</h1>

<form method="POST">
    <textarea name="content" rows="4" cols="40" placeholder="What's on your mind?"></textarea>
    <br><br>
    <button type="submit">Post</button>
</form>

<hr>

{% for post in posts %}
    <p>{{ post.content }}</p>
    <small>Posted by: {{ post.user.username }}</small>

    {% if post.user.username == session["username"] %}
        <br>

        <a href="/edit-post/{{ post.id }}">Edit</a>

        <form method="POST" action="/delete-post/{{ post.id }}">
            <button type="submit">Delete</button>
        </form>
    {% endif %}

    <hr>
{% endfor %}

{% endblock %}
