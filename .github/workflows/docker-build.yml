
name: Docker Build Check

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency security audit
        run: pip-audit -r requirements.txt

      - name: Build Docker image
        run: docker build -t secure-login-app .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-login-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/secure-login-app
            git pull
            sudo docker build -t secure-login-app .
            sudo docker stop secure-login-app-container || true
            sudo docker rm secure-login-app-container || true
            sudo docker run -d --restart unless-stopped --env-file .env -p 80:5000 --name secure-login-app-container secure-login-app